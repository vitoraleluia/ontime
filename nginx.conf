events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        server_tokens off;

        # Match exact pattern: /YYYY-MM/GUID.webp (or jpeg/jpg/png)
        # Regex captures prevent any folder traversal since no dots or directory jumps are allowed in YYYY-MM or filename matches
        location ~ "^/(?<year>\d{4})-(?<month>\d{2})/(?<file>[a-f0-9\-]+\.(webp|jpeg|jpg|png))$" {
            root /usr/share/nginx/html/images;
            autoindex off;
            
             # Enable client-side immutable browser caching for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable";

            # Direct mapping from variables guarantees no path traversal
            try_files /$year-$month/$file =404;
        }

        # Block everything else with a 403 Forbidden
        location / {
            return 403;
        }
    }
}
